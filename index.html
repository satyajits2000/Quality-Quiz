<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTRA Quality Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ── SYSTRA colour palette (teal variant for Quality Days) ── */
:root {
  --s-teal:   #003e4a;
  --s-teal2:  #005a6e;
  --s-teal-l: #e0f0f3;
  --s-red:    #d22328;
  --s-gold:   #c8a96e;
}

body {
  font-family:'Inter',sans-serif;
  background: linear-gradient(120deg,#e4f4f7,#f0fafc);
  margin:0; padding:20px;
}

/* ── Registration gate ── */
#reg-gate {
  max-width:520px; margin:30px auto;
  background:#fff; border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.12); overflow:hidden;
}
.reg-header {
  background:var(--s-teal); padding:24px 28px 20px; text-align:center; position:relative;
}
.reg-header::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(255,255,255,0.04) 18px,rgba(255,255,255,0.04) 36px);
}
.reg-header .logo-wrap { position:relative;z-index:1; margin-bottom:10px; }
.reg-header .logo-wrap img { height:32px; filter:brightness(0) invert(1); }
.reg-header h2 { color:#fff; font-size:1.2em; font-weight:700; margin:0; position:relative;z-index:1; }
.reg-header p  { color:rgba(255,255,255,0.75); font-size:0.82em; margin:4px 0 0; position:relative;z-index:1; }
.reg-body { padding:24px 28px 28px; }
.reg-body h3 {
  font-size:0.85em; font-weight:700; text-transform:uppercase; letter-spacing:0.07em;
  color:var(--s-teal); border-left:3px solid var(--s-teal); padding-left:10px; margin:0 0 18px;
}
.session-pill {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--s-teal); color:#fff;
  padding:5px 12px; border-radius:20px; font-size:0.78em; font-weight:600; margin-bottom:18px;
}
.live-dot { width:7px;height:7px;border-radius:50%;background:#4caf50;animation:blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }
.field-row { margin-bottom:14px; }
.field-row label { display:block;font-size:0.78em;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#444;margin-bottom:5px; }
.field-row input {
  width:100%;padding:10px 13px;border:1.5px solid #ddd;border-radius:6px;
  font-family:'Inter',sans-serif;font-size:0.92em;color:#222;background:#f5fafb;
  box-sizing:border-box;transition:border-color 0.2s,box-shadow 0.2s;
}
.field-row input:focus { outline:none;border-color:var(--s-teal);box-shadow:0 0 0 3px rgba(0,62,74,0.1);background:#fff; }
.field-row .opt { font-weight:400;color:#999;font-size:0.85em;text-transform:none;letter-spacing:0; }
.reg-error { background:#e0f0f3;border:1px solid #b0d8df;color:var(--s-teal);padding:9px 12px;border-radius:6px;font-size:0.82em;margin-bottom:12px;display:none; }
.btn-start {
  width:100%;padding:13px;background:var(--s-teal);color:#fff;border:none;border-radius:8px;
  font-family:'Inter',sans-serif;font-size:1em;font-weight:700;cursor:pointer;
  letter-spacing:0.04em;text-transform:uppercase;transition:background 0.2s,transform 0.1s;
}
.btn-start:hover  { background:#001e24; }
.btn-start:active { transform:scale(0.98); }

/* ── Chatbot container ── */
.chatbot-container {
  max-width:600px; margin:40px auto; background:#fff;
  border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.12);
  padding:25px; display:none;
}
.chat-title { text-align:center;font-size:1.5em;margin-bottom:10px;font-weight:700;color:var(--s-teal); }

.session-bar {
  background:var(--s-teal); color:rgba(255,255,255,0.7);
  padding:7px 14px; font-size:0.76em; display:flex; justify-content:space-between;
  border-radius:8px; margin-bottom:12px;
}

.chat-history {
  border:1px solid #b0d8df; border-radius:10px; background:#e4f4f7;
  min-height:200px; max-height:380px; padding:14px; overflow-y:auto;
  margin-bottom:15px; font-size:1rem;
}
.chat-message { display:flex;align-items:flex-start;margin-bottom:14px;opacity:0;animation:fadeIn 0.5s forwards; }
@keyframes fadeIn { to{opacity:1} }
.chat-avatar { width:40px;height:40px;margin-right:12px;border-radius:50%;background:#eee;object-fit:cover;border:2px solid #b0d8df; }
.bot-msg  { background:#cce9ef;border-radius:16px;padding:10px 14px;max-width:78%; }
.user     { color:#222;font-weight:600;justify-content:flex-end; }
.user-msg { background:#b0d8df;border-radius:16px;padding:10px 14px;max-width:78%;margin-left:auto; }

.chat-button {
  font-size:1rem;
  background:linear-gradient(90deg,var(--s-teal),var(--s-teal2));
  color:#fff;border:none;padding:10px 18px;border-radius:8px;
  cursor:pointer;margin:5px 0;width:100%;transition:0.3s;
}
.chat-button:hover { background:linear-gradient(90deg,#001e24,var(--s-teal));transform:scale(1.03); }

.question  { font-weight:700;margin-bottom:10px;font-size:1.1em;color:var(--s-teal); }
.option-list{ margin:10px 0; }
.divider   { border-top:2px dashed #b0d8df;margin:20px 0 10px 0; }
.correct   { background-color:#d4edda !important; }
.incorrect { background-color:#f8d7da !important; }

/* ── Certificate ── */
.certificate-section {
  text-align:center;background:#e4f4f7;border-radius:12px;margin-top:22px;
  padding:20px 10px 16px 10px;box-shadow:0 2px 12px rgba(0,62,74,0.08);
}
.certificate-section input { font-size:1em;margin:4px 10px;padding:4px 10px;border-radius:6px;border:1px solid #b0d8df; }
#certificateCanvas { margin:20px auto 0 auto;display:block;border:1px solid #b0d8df;background:#fff;max-width:100%; }

.logo-container { display:flex;justify-content:center;align-items:center;margin-bottom:15px;gap:20px;flex-wrap:wrap; }
.logo-container img { height:35px;max-width:45%;object-fit:contain;border-radius:6px; }
#qd-mascot { display:block;margin:6px auto;max-width:25%;height:auto; }
@media(max-width:480px){ .logo-container img{ height:28px;max-width:40%; } }

#firebase-status {
  position:fixed;bottom:16px;right:16px;background:#fff;border-radius:20px;
  padding:6px 14px;font-size:0.76em;font-weight:600;
  box-shadow:0 4px 16px rgba(0,0,0,0.15);display:flex;align-items:center;gap:6px;z-index:100;
}
.f-dot { width:8px;height:8px;border-radius:50%;background:#ffc107; }
.f-dot.ok  { background:#4caf50; }
.f-dot.err { background:var(--s-red); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<!-- Registration Gate -->
<div id="reg-gate">
  <div class="reg-header">
    <div class="logo-wrap"><img src="systra-logo.png" alt="SYSTRA"></div>
    <h2>Quality Days Quiz</h2>
    <p>IMS &amp; Quality Knowledge Assessment</p>
  </div>
  <div class="reg-body">
    <div class="session-pill">
      <span class="live-dot"></span>
      <span id="session-name-display">Loading session…</span>
    </div>
    <h3>Your Details</h3>
    <div id="reg-error" class="reg-error">Please fill in your Name and Entity to proceed.</div>
    <div class="field-row">
      <label>Full Name <span style="color:var(--s-red)">*</span></label>
      <input type="text" id="reg-name" placeholder="Enter your full name">
    </div>
    <div class="field-row">
      <label>Entity / Business Unit <span style="color:var(--s-red)">*</span></label>
      <input type="text" id="reg-entity" placeholder="e.g. SYSTRA India, SYSTRA France…">
    </div>
    <div class="field-row">
      <label>Department <span class="opt">(optional)</span></label>
      <input type="text" id="reg-dept" placeholder="e.g. Internal Control, Finance…">
    </div>
    <div class="field-row">
      <label>Email <span class="opt">(optional)</span></label>
      <input type="email" id="reg-email" placeholder="your.name@systra.com">
    </div>
    <button class="btn-start" onclick="startQuiz()">Start Quality Days Quiz →</button>
  </div>
</div>

<!-- Chatbot container -->
<div class="chatbot-container" id="chatbot-container">
  <div class="logo-container">
    <img src="systra-logo.png" alt="SYSTRA Logo">
    <img src="dci-logo.png"    alt="DCI Logo">
  </div>
  <div class="chat-title">SYSTRA Quality Quiz</div>
  <img src="chatbot.jpg" id="qd-mascot" alt="Mascot">

  <div class="session-bar">
    <span><span class="live-dot"></span> Live Tracking Active</span>
    <span id="participant-bar">—</span>
    <span id="score-bar">Score: 0</span>
  </div>

  <div class="chat-history" id="chat-history"></div>
  <div id="chat-options" class="option-list"></div>

  <div id="certificateSection" class="certificate-section" style="display:none;">
    <div><b>🎓 Download your Certificate</b></div>
    <label>Name: <input type="text" id="userName" placeholder="Your Name"></label>
    <label>Date: <input type="text" id="certDate" style="width:140px;"></label><br>
    <button id="generateCertificate"    class="chat-button" style="max-width:230px;">Show Certificate</button>
    <canvas id="certificateCanvas" width="700" height="480" style="display:none;"></canvas><br>
    <button id="downloadCertificate"    class="chat-button" style="display:none;">Download PNG</button>
    <button id="downloadPdfCertificate" class="chat-button" style="display:none;">Download PDF</button>
  </div>
</div>

<div id="firebase-status">
  <div class="f-dot" id="f-dot"></div>
  <span id="f-label">Connecting…</span>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ──────────────────────────────────────────────────────────────
   🔥  FIREBASE CONFIGURATION  — same values as quiz-redbook.html
──────────────────────────────────────────────────────────────── */
const firebaseConfig = {
  apiKey: "AIzaSyDQaDGAOslmVabYfMp7erAVDCzCXhAUj7c",
  authDomain: "quality-quiz-5d8fa.firebaseapp.com",
  databaseURL: "https://quality-quiz-5d8fa-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "quality-quiz-5d8fa",
  storageBucket: "quality-quiz-5d8fa.firebasestorage.app",
  messagingSenderId: "200263271557",
  appId: "1:200263271557:web:24908b21ce8d7bb1a795ec",
  measurementId: "G-7C8C9Y2TJH"
};

let db, participantRef = null, sessionId = 'offline_' + Date.now();

try {
  const app = initializeApp(firebaseConfig, 'qualitydays-quiz');
  db = getDatabase(app);
  document.getElementById('f-dot').className = 'f-dot ok';
  document.getElementById('f-label').textContent = 'Firebase Connected';
} catch {
  document.getElementById('f-dot').className = 'f-dot err';
  document.getElementById('f-label').textContent = 'Offline Mode';
}

async function loadSession() {
  try {
    const snap = await get(ref(db, 'sessions'));
    if (snap.exists()) {
      const active = Object.entries(snap.val()).find(([,v]) => v.status === 'active');
      if (active) { sessionId = active[0]; document.getElementById('session-name-display').textContent = active[1].name; return; }
    }
    document.getElementById('session-name-display').textContent = 'General Session';
    sessionId = 'general';
  } catch { document.getElementById('session-name-display').textContent = 'No Active Session'; }
}
if (db) loadSession();

window.firebaseRegister = async function(data) {
  if (!db) return null;
  try {
    const r = push(ref(db, `sessions/${sessionId}/participants`));
    participantRef = r;
    await set(r, data);
    return r.key;
  } catch { return null; }
};

window.firebaseUpdate = async function(data) {
  if (!participantRef) return;
  try { await set(participantRef, data); } catch {}
};

// Resume support
window._getSessionId = function() { return sessionId; };
window.firebaseFetchParticipant = async function(sid, pid) {
  if (!db) return null;
  try {
    const snap = await get(ref(db, `sessions/${sid}/participants/${pid}`));
    return snap.exists() ? snap.val() : null;
  } catch { return null; }
};
window.firebaseSetParticipantRef = function(sid, pid) {
  participantRef = ref(db, `sessions/${sid}/participants/${pid}`);
};
</script>

<!-- Quiz Logic -->
<script>
// ── Quality Days quiz questions ───────────────────────────────────────────────
// NOTE: Replace / extend these questions with your actual Quality Days content.
// The structure mirrors the Red Book quiz exactly.
const quizData = [
    { type:"matching", question:"Match ISO codification with their certification objectives:", 
      pairs:[["ISO 9001","Quality Management systems"],["ISO 14001","Environmental management systems"],
             ["ISO 45001","Occupational health and safety management system"],["ISO 37001","Anti-bribery management system"],
             ["ISO 31000","Risk Management"],["ISO 21500","Project Management"],["ISO 26000","Social responsibility"],
             ["ISO 27001","Information Security Management System"]],
      feedback:"Here are the correct matches.", citation:"What gets measured gets improved (Peter Drucker)"},
    { type:"mcq", question:"What is the key objective of Quality Management System (ISO 9001)?", 
      options:["Create robust documentation base","Monitor closely suppliers performance to reduce costs","Increase company performance and drive customer satisfaction"], answer:2, feedback:"The main objective: Increase company performance and drive customer satisfaction."},
    { type:"mcq", question:"Do you know what the abbreviation PDCA stands for?", 
      options:["Plan / Deliver / Consult / Audit","Plan / Diagnostic / Consult / Act","Plan / Do / Check / Act"], answer:2, feedback:"PDCA stands for Plan / Do / Check / Act."},
    { type:"mcq", question:"What is the key objective of PDCA method?", 
      options:["Structure the process reviews","Design cycle of continuous improvement for process optimization","Define the system of company management"], answer:1, feedback:"PDCA is a design cycle for continuous improvement."},
    { type:"info", citation:"Who stops improving, stops being good (Oliver Cromwell)"},
    { type:"mcq", question:"Kaizen – term known within lean management as:", 
      options:["Continuous improvement of performance (quality, cost, time)","Continuous improvement of quality","Change management"], answer:0, link:"https://www.youtube.com/watch?v=NFrwxzUhfNA&pp=ygUTa2FpemVuIGxlYW4gZW5nbGlzaA%3D%3D", feedback:"Kaizen means continuous improvement of performance."},
    { type:"info", citation:"Quality is everyone’s responsibility (W. Edwards DEMING)"},
    { type:"mcq", question:"In Systra our management system is:", options:["Not formalized","Managed out of operations","Integrated"], answer:2, feedback:"Systra has an integrated management system."},
    { type:"mcq", question:"Common and unique platform to support our IMS (SMI) is:", options:["MySMI","Teams IMS community","Communication web page"], answer:0, feedback:"Correct! MySMI is the main platform."},
    { type:"mcq", question:"What are the Group Policies within our IMS (SMI)?", options:["General Policy, 3S Policy, Ethics and compliance Policy","General Policy, 3S Policy, Ethics and compliance Policy, Sustainability Policy","General Policy, 3S Policy, Ethics and compliance Policy, Sustainability Policy, 9 Saving Rules, Anticorruption Code"], answer:1, feedback:"Correct! These are the main Group Policies."},
    { type:"info", citation:'Check all the Policies regularly in MySMI (Systra Group IMS team 😊)'},
    { type:"mcq", question:"What is the Group Framework that establish all minimum requirements every entity / Business Unit must comply with?", options:["White papers","Green Book","Red Book"], answer:2, feedback:"Red Book sets all minimum requirements."},
    { type:"info", citation:'Red Book is the best reading for your coffee breaks (Systra Group IMS team 😊)'},
    { type:"mcq", question:"Who is managing IMS (SMI), MySMI and Red Book in Systra?", options:["Project managers in India","Group Legal team in Paris","Group Internal Control team in Paris"], answer:2, feedback:"Group Internal Control team in Paris manages IMS (SMI), MySMI, and Red Book."}
];

let currentQuestion = 0, totalCorrect = 0;
const chatHistory = document.getElementById('chat-history');
const optionsDiv  = document.getElementById('chat-options');
const totalQ      = quizData.length; // total items including info cards
const scorableQ   = quizData.filter(q => q.type === 'mcq' || q.type === 'matching').length; // real questions = 10
let scorableIndex = 0; // display counter for "Question X / 10"
let participantMeta = {};

function startQuiz() {
  const name   = document.getElementById('reg-name').value.trim();
  const entity = document.getElementById('reg-entity').value.trim();
  if (!name || !entity) { document.getElementById('reg-error').style.display='block'; return; }

  participantMeta = {
    name, entity,
    dept  : document.getElementById('reg-dept').value.trim(),
    email : document.getElementById('reg-email').value.trim(),
    quiz  : 'qualitydays',
    startTime : new Date().toISOString(),
    score:0, progress:0, status:'in_progress', answers:[]
  };

  if (window.firebaseRegister) {
    window.firebaseRegister(participantMeta).then(function(key) {
      if (key) {
        const sid = window._getSessionId ? window._getSessionId() : sessionId;
        const resumeData = { sessionId: sid, participantId: key };
        // Save to localStorage (fast, in-session)
        try { localStorage.setItem('systra_qualitydays_resume', JSON.stringify(resumeData)); } catch(e) {}
        // Save to cookie (survives iOS Safari ITP & app restarts) — 30-day expiry
        try {
          const expires = new Date(Date.now() + 30*24*60*60*1000).toUTCString();
          document.cookie = 'systra_qualitydays_resume=' + encodeURIComponent(JSON.stringify(resumeData)) + '; expires=' + expires + '; path=/; SameSite=Lax';
        } catch(e) {}
      }
    });
  }

  scorableIndex = 0; // reset display counter
  document.getElementById('reg-gate').style.display        = 'none';
  document.getElementById('chatbot-container').style.display = 'block';
  document.getElementById('participant-bar').textContent   = name;
  document.getElementById('userName').value = name;
  document.getElementById('certDate').value = new Date().toLocaleDateString();

  showWelcome();
}

function addMessage(message, sender='bot') {
  const d = document.createElement('div');
  d.classList.add('chat-message');
  if (sender === 'bot') {
    d.innerHTML = `<img src="chatbot.jpg" class="chat-avatar" alt="bot"><div class="bot-msg">${message}</div>`;
  } else {
    d.classList.add('user');
    d.innerHTML = `<div class="user-msg">${message}</div>`;
  }
  chatHistory.appendChild(d);
  chatHistory.scrollTop = chatHistory.scrollHeight;
}

function addDivider() {
  const d = document.createElement('div'); d.className='divider'; chatHistory.appendChild(d);
}

function showQuestion() {
  const q = quizData[currentQuestion];
  optionsDiv.innerHTML = '';
  addDivider();

  // Handle info/citation cards — display message and auto-advance
  if (q.type === 'info') {
    if (q.citation) addMessage("📌 " + q.citation);
    setTimeout(nextQuestion, 4000);
    return;
  }

  // Handle matching questions — interactive drag-and-match
  if (q.type === 'matching') {
    scorableIndex++;
    addMessage(`<span class="question">Question ${scorableIndex}/${scorableQ}: ${q.question}</span>`);
    addMessage('👉 Click an ISO code on the left, then click its matching objective on the right to pair them.');

    // Build shuffled copies
    const lefts  = q.pairs.map(p => p[0]);
    const rights = [...q.pairs.map(p => p[1])].sort(() => Math.random() - 0.5);
    const userMap = {}; // ISO code → chosen objective
    let selectedLeft = null;

    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'display:flex;gap:10px;width:100%;margin-top:6px;';

    const leftCol  = document.createElement('div');
    leftCol.style.cssText = 'flex:1;display:flex;flex-direction:column;gap:5px;';
    const rightCol = document.createElement('div');
    rightCol.style.cssText = 'flex:2;display:flex;flex-direction:column;gap:5px;';

    function makeBtn(text, col) {
      const b = document.createElement('button');
      b.className = 'chat-button';
      b.style.cssText = 'font-size:0.82rem;padding:7px 10px;text-align:left;white-space:normal;line-height:1.3;';
      b.textContent = text;
      b.dataset.val = text;
      b.dataset.col = col;
      return b;
    }

    function updateRightButtons() {
      // Grey out already-used right options
      const usedRights = Object.values(userMap);
      Array.from(rightCol.children).forEach(b => {
        if (usedRights.includes(b.dataset.val)) {
          b.style.opacity = '0.4';
          b.disabled = true;
        } else {
          b.style.opacity = '1';
          b.disabled = false;
        }
      });
    }

    function refreshLeftLabels() {
      Array.from(leftCol.children).forEach(b => {
        if (b.dataset.col !== 'left') return;
        const iso = b.dataset.val;
        const matched = userMap[iso];
        b.textContent = matched ? iso + ' ✓' : iso;
        b.style.background = matched
          ? 'linear-gradient(90deg,#2e7d32,#388e3c)'
          : (selectedLeft === iso ? 'linear-gradient(90deg,#c8a96e,#b8945a)' : '');
        b.style.backgroundImage = matched
          ? 'linear-gradient(90deg,#2e7d32,#388e3c)'
          : (selectedLeft === iso ? 'linear-gradient(90deg,#c8a96e,#b8945a)' : 'linear-gradient(90deg,var(--s-teal),var(--s-teal2))');
      });
    }

    lefts.forEach(iso => {
      const b = makeBtn(iso, 'left');
      b.onclick = () => {
        if (userMap[iso]) return; // already matched
        selectedLeft = iso;
        refreshLeftLabels();
      };
      leftCol.appendChild(b);
    });

    rights.forEach(obj => {
      const b = makeBtn(obj, 'right');
      b.style.fontSize = '0.78rem';
      b.onclick = () => {
        if (!selectedLeft) {
          addMessage('⬅️ Please select an ISO code on the left first!');
          return;
        }
        userMap[selectedLeft] = obj;
        selectedLeft = null;
        refreshLeftLabels();
        updateRightButtons();
        // Auto-submit when all matched
        if (Object.keys(userMap).length === lefts.length) {
          submitMatchingBtn.style.display = 'block';
        }
      };
      rightCol.appendChild(b);
    });

    wrapper.appendChild(leftCol);
    wrapper.appendChild(rightCol);
    optionsDiv.appendChild(wrapper);

    const submitMatchingBtn = document.createElement('button');
    submitMatchingBtn.className = 'chat-button';
    submitMatchingBtn.style.cssText = 'max-width:220px;margin-top:8px;display:none;';
    submitMatchingBtn.innerText = '✅ Submit Matches';
    submitMatchingBtn.onclick = () => {
      optionsDiv.innerHTML = '';
      // Score: 1 point if ALL pairs correct (all-or-nothing for matching)
      let correctCount = 0;
      q.pairs.forEach(([iso, obj]) => { if (userMap[iso] === obj) correctCount++; });
      const allCorrect = correctCount === q.pairs.length;
      if (allCorrect) {
        totalCorrect++;
        addMessage('✅ Perfect! All ' + q.pairs.length + ' matches correct!');
      } else {
        addMessage('❌ ' + correctCount + ' / ' + q.pairs.length + ' correct. Here are the right answers:');
      }
      document.getElementById('score-bar').textContent = 'Score: ' + totalCorrect;
      // Show participant answer vs correct answer table
      let matchHtml = '<table style="width:100%;border-collapse:collapse;font-size:0.82em;">'
        + '<tr style="background:#003e4a;color:#fff;">'
        + '<th style="padding:5px 8px;border:1px solid #b0d8df;text-align:left;">ISO Code</th>'
        + '<th style="padding:5px 8px;border:1px solid #b0d8df;text-align:left;">Your Answer</th>'
        + '<th style="padding:5px 8px;border:1px solid #b0d8df;text-align:left;">Correct Answer</th>'
        + '<th style="padding:5px 8px;border:1px solid #b0d8df;">✓</th>'
        + '</tr>';
      q.pairs.forEach(([iso, obj]) => {
        const userAns = userMap[iso] || '—';
        const ok = userAns === obj;
        const rowBg = ok ? '#d4edda' : '#f8d7da';
        matchHtml += '<tr style="background:' + rowBg + '">'
          + '<td style="padding:5px 8px;border:1px solid #b0d8df;font-weight:700;">' + iso + '</td>'
          + '<td style="padding:5px 8px;border:1px solid #b0d8df;' + (ok ? '' : 'color:#c0392b;') + '">' + userAns + '</td>'
          + '<td style="padding:5px 8px;border:1px solid #b0d8df;font-weight:' + (ok ? 'normal' : '700') + ';">' + obj + '</td>'
          + '<td style="padding:5px 8px;border:1px solid #b0d8df;text-align:center;">' + (ok ? '✅' : '❌') + '</td>'
          + '</tr>';
      });
      matchHtml += '</table>';
      addMessage(matchHtml);
      if (q.citation) addMessage('📌 ' + q.citation);
      const answers = [...(participantMeta.answers||[]), {q:currentQuestion, correct:allCorrect}];
      participantMeta = { ...participantMeta, score:totalCorrect, progress:currentQuestion+1, answers };
      if (window.firebaseUpdate) window.firebaseUpdate(participantMeta);
      setTimeout(nextQuestion, 6000);
    };
    optionsDiv.appendChild(submitMatchingBtn);
    return;
  }

  // Standard MCQ
  scorableIndex++;
  addMessage(`<span class="question">Question ${scorableIndex}/${scorableQ}: ${q.question}</span>`);
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'chat-button';
    btn.innerText = opt;
    btn.onclick = () => {
      addMessage(opt, 'user');
      const correct = (i === q.answer);
      if (correct) { btn.classList.add('correct'); totalCorrect++; addMessage("✅ Correct!"); }
      else         { btn.classList.add('incorrect'); addMessage("❌ Incorrect! Correct answer: " + q.options[q.answer]); }
      if (q.feedback) addMessage("ℹ️ " + q.feedback);
      if (q.citation) addMessage("📌 " + q.citation);

      optionsDiv.querySelectorAll('button').forEach(b => b.disabled = true);
      document.getElementById('score-bar').textContent = `Score: ${totalCorrect}`;

      const answers = [...(participantMeta.answers||[]), {q:currentQuestion, correct}];
      participantMeta = { ...participantMeta, score:totalCorrect, progress:currentQuestion+1, answers };
      if (window.firebaseUpdate) window.firebaseUpdate(participantMeta);

      setTimeout(nextQuestion, 4000);
      optionsDiv.innerHTML = '';
    };
    optionsDiv.appendChild(btn);
  });
}

function nextQuestion() {
  currentQuestion++;
  if (currentQuestion >= totalQ) {
    optionsDiv.innerHTML = '';
    addDivider();
    addMessage(`<b>🎉 Quiz finished!</b> You answered <b>${totalCorrect}</b> out of ${scorableQ} questions correctly.`);
    participantMeta.status    = 'completed';
    participantMeta.endTime   = new Date().toISOString();
    participantMeta.finalScore = totalCorrect;
    if (window.firebaseUpdate) window.firebaseUpdate(participantMeta);
    try { localStorage.removeItem('systra_qualitydays_resume'); } catch(e) {}
    _qdClearResumeCookie();
    document.getElementById('certificateSection').style.display = 'block';
    document.getElementById('certDate').value = new Date().toLocaleDateString();
  } else {
    showQuestion();
  }
}

function drawCertificate(name, date, score, maxScore) {
const canvas = document.getElementById('certificateCanvas');
const ctx = canvas.getContext('2d');
ctx.clearRect(0, 0, canvas.width, canvas.height);
// --- Solid white background ---
ctx.fillStyle = "#ffffff";
ctx.fillRect(0, 0, canvas.width, canvas.height);
// --- Outer border frame ---
ctx.save();
ctx.strokeStyle = "#003e4a";
ctx.lineWidth = 8;
ctx.shadowColor = "rgba(0,62,74,0.25)";
ctx.shadowBlur = 12;
ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
ctx.restore();
// --- Inner thin border ---
ctx.save();
ctx.strokeStyle = "#c8a96e";
ctx.lineWidth = 2;
ctx.strokeRect(26, 26, canvas.width - 52, canvas.height - 52);
ctx.restore();
// --- Teal header banner (inside borders) ---
ctx.fillStyle = "#003e4a";
ctx.fillRect(27, 27, canvas.width - 54, 62);
// --- SYSTRA logo text (white, on teal banner) ---
ctx.save();
ctx.font = "bold 28px Inter, sans-serif";
ctx.fillStyle = "#ffffff";
ctx.textAlign = "center";
ctx.fillText("SYSTRA", canvas.width/2, 57.4);
ctx.font = "14px Inter, sans-serif";
ctx.fillStyle = "rgba(255,255,255,0.7)";
ctx.fillText("", canvas.width/2 - 160, 83);
ctx.restore();
// --- Certificate title (right side of banner) ---
ctx.font = "bold 20px Inter, sans-serif";
ctx.fillStyle = "#ffffff";
ctx.textAlign = "center";
ctx.fillText("Quality Days — Certificate of Completion", canvas.width/2, 80);
// --- Gold decorative line ---
ctx.save();
ctx.strokeStyle = "#c8a96e";
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(60, 100);
ctx.lineTo(canvas.width - 60, 100);
ctx.stroke();
ctx.restore();
// --- Recipient info ---
ctx.font = "18px Inter, sans-serif";
ctx.fillStyle = "#003e4a";
ctx.textAlign = "center";
ctx.fillText("This certifies that", canvas.width/2, 135);
ctx.font = "bold 30px Inter, sans-serif";
ctx.fillStyle = "#003e4a";
ctx.fillText(name, canvas.width/2, 180);
// --- Underline under name ---
ctx.save();
ctx.strokeStyle = "#003e4a";
ctx.lineWidth = 1;
ctx.beginPath();
ctx.moveTo(canvas.width/2 - 180, 188);
ctx.lineTo(canvas.width/2 + 180, 188);
ctx.stroke();
ctx.restore();
ctx.font = "16px Inter, sans-serif";
ctx.fillStyle = "#444";
ctx.fillText("has successfully completed the SYSTRA Quality General Quiz", canvas.width/2, 218);
ctx.font = "15px Inter, sans-serif";
ctx.fillStyle = "#005a6e";
ctx.fillText("Date: " + date + "   |   Score: " + score + " / " + maxScore, canvas.width/2, 248);
// --- Gold star decorations ---
ctx.save();
ctx.font = "28px sans-serif";
ctx.fillStyle = "#c8a96e";
ctx.textAlign = "center";
ctx.fillText("★", 70, 280);
ctx.fillText("★", canvas.width - 70, 280);
ctx.restore();
// --- Muskat logo at bottom, below text ---
const logoImg = new window.Image();
logoImg.onload = function(){
const naturalW = logoImg.naturalWidth;
const naturalH = logoImg.naturalHeight;
const targetW = 200;
const scale = targetW / naturalW;
const targetH = naturalH * scale;
const x = (canvas.width - targetW) / 2;
const y = canvas.height - 30 - targetH; // bottom margin 30px
ctx.globalAlpha = 1;
ctx.drawImage(logoImg, x, y, targetW, targetH);
};
logoImg.src = muskatLogoBase64;
}

document.getElementById('generateCertificate').onclick=function(){
    const name = document.getElementById('userName').value || "Participant";
    const date = document.getElementById('certDate').value || new Date().toLocaleDateString();
    drawCertificate(name,date,totalCorrect,scorableQ);
    document.getElementById('certificateCanvas').style.display='block';
    document.getElementById('downloadCertificate').style.display='inline-block';
    document.getElementById('downloadPdfCertificate').style.display='inline-block';
};
document.getElementById('downloadCertificate').onclick=function(){
    const canvas=document.getElementById('certificateCanvas');
    const link=document.createElement('a');
    link.href=canvas.toDataURL('image/png');
    link.download='certificate.png';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
};
document.getElementById('downloadPdfCertificate').onclick=function(){
    const canvas=document.getElementById('certificateCanvas');
    const imgData=canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({orientation:'landscape',unit:'px',format:[canvas.width,canvas.height]});
    pdf.addImage(imgData,'PNG',0,0,canvas.width,canvas.height);
    pdf.save('certificate.pdf');
};
document.getElementById('certDate').value = new Date().toLocaleDateString();

// Welcome
const welcomeLines = [
  "Welcome to the SYSTRA Quality Quiz!",
  "Instructions:",
  "👉 Each question tests your knowledge of IMS, Quality, and SYSTRA processes.",
  "👉 Answer carefully — the Red Book and MySMI are your friends!",
  "👉 Smile: you're learning 😊"
];
function showWelcome(i=0) {
  if (i < welcomeLines.length) {
    addMessage(welcomeLines[i]);
    setTimeout(() => showWelcome(i+1), 4000);
  } else {
    setTimeout(showQuestion, 800);
  }
}
// ── Resume-on-load ─────────────────────────────────────────────────────────
// iOS Safari ITP Fix: read from cookie (most reliable) → localStorage → URL param
function _qdReadResumeCookie() {
  try {
    const match = document.cookie.split('; ').find(r => r.startsWith('systra_qualitydays_resume='));
    if (match) return JSON.parse(decodeURIComponent(match.split('=').slice(1).join('=')));
  } catch(e) {}
  return null;
}
function _qdClearResumeCookie() {
  try { document.cookie = 'systra_qualitydays_resume=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; SameSite=Lax'; } catch(e) {}
}
(async function() {
  let info = null;
  // 1. Try cookie first (survives iOS Safari ITP)
  info = _qdReadResumeCookie();
  // 2. Try localStorage
  if (!info || !info.sessionId || !info.participantId) {
    try {
      const saved = localStorage.getItem('systra_qualitydays_resume');
      if (saved) info = JSON.parse(saved);
    } catch {}
  }
  // 3. Try URL param (for deep-link QR codes)
  if (!info || !info.sessionId || !info.participantId) {
    try {
      const url = new URL(window.location.href);
      const token = url.searchParams.get('r');
      if (token) {
        const decoded = atob(token);
        const sep = decoded.indexOf(':');
        if (sep > 0) {
          info = { sessionId: decoded.slice(0, sep), participantId: decoded.slice(sep + 1) };
        }
      }
    } catch {}
  }
  // Write back to cookie and localStorage so all paths are synced
  if (info && info.sessionId && info.participantId) {
    try { localStorage.setItem('systra_qualitydays_resume', JSON.stringify(info)); } catch {}
    try {
      const expires = new Date(Date.now() + 30*24*60*60*1000).toUTCString();
      document.cookie = 'systra_qualitydays_resume=' + encodeURIComponent(JSON.stringify(info)) + '; expires=' + expires + '; path=/; SameSite=Lax';
    } catch {}
  }
  if (!info || !info.sessionId || !info.participantId) return;

  const banner = document.createElement('div');
  banner.style.cssText = 'background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:12px 16px;margin-bottom:14px;font-size:0.88em;display:flex;align-items:center;justify-content:space-between;gap:10px;';
  banner.innerHTML = '<span>&#9654; You have an incomplete quiz. <b>Resume where you left off?</b></span>' +
    '<div style="display:flex;gap:8px">' +
    '<button id="btn-resume" style="background:#003e4a;color:#fff;border:none;border-radius:5px;padding:6px 12px;cursor:pointer;font-size:0.85em">Resume</button>' +
    '<button id="btn-fresh" style="background:transparent;color:#666;border:1px solid #ccc;border-radius:5px;padding:6px 12px;cursor:pointer;font-size:0.85em">Start fresh</button>' +
    '</div>';

  const regBody = document.querySelector('.reg-body');
  if (regBody) regBody.insertBefore(banner, regBody.firstChild);

  document.getElementById('btn-fresh').onclick = function() {
    try { localStorage.removeItem('systra_qualitydays_resume'); } catch(e) {}
    _qdClearResumeCookie();
    try {
      const url = new URL(window.location.href);
      url.searchParams.delete('r');
      window.history.replaceState(null, '', url.toString());
    } catch(e) {}
    banner.remove();
  };

  document.getElementById('btn-resume').onclick = async function() {
    if (!window.firebaseFetchParticipant) { banner.remove(); return; }
    const data = await window.firebaseFetchParticipant(info.sessionId, info.participantId);
    if (!data) { alert('Could not load your previous session.'); return; }

    // If quiz was already completed, clear cookie + localStorage + URL param and hide banner
    if (data.status === 'completed') {
      try { localStorage.removeItem('systra_qualitydays_resume'); } catch(e) {}
      _qdClearResumeCookie();
      try {
        const url = new URL(window.location.href);
        url.searchParams.delete('r');
        window.history.replaceState(null, '', url.toString());
      } catch(e) {}
      banner.remove();
      return;
    }

    participantMeta = data;
    currentQuestion = Math.min(data.progress || 0, quizData.length - 1);
    totalCorrect    = data.score || 0;

    // Restore scorableIndex by counting how many scorable questions appeared
    // before currentQuestion in the quizData array
    scorableIndex = quizData.slice(0, currentQuestion).filter(q => q.type === 'mcq' || q.type === 'matching').length;

    if (window.firebaseSetParticipantRef) {
      window.firebaseSetParticipantRef(info.sessionId, info.participantId);
    }

    document.getElementById('reg-gate').style.display = 'none';
    document.getElementById('chatbot-container').style.display = 'block';
    document.getElementById('participant-bar').textContent = data.name || '';
    document.getElementById('score-bar').textContent = 'Score: ' + totalCorrect;
    document.getElementById('userName') && (document.getElementById('userName').value = data.name || '');
    document.getElementById('certDate') && (document.getElementById('certDate').value = new Date().toLocaleDateString());

    addMessage('&#8618; <b>Resuming from question ' + (currentQuestion + 1) + '.</b> Welcome back, ' + (data.name || 'participant') + '!');
    setTimeout(showQuestion, 600);
  };
})();

</script>
</body>
</html>
